<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Wind Converter</h1>
    <br>
    <h2>Click Input Value Units</h2>

    <div class="search-box">
        <input type="number" id="valueNumber" placeholder="Enter Wind Speed" step="0.1">
        <br>
        <br>
        <button onclick="getKnots()">MPH</button>
        <button onclick="getMPH()">Knots</button>
        <button onclick="getMS()"> m/s </button>
    </div>
    <div id="result" class="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
